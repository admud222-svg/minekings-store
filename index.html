<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdHost Addon Manager</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fira+Code&family=Nunito:wght@400;700&display=swap');

        :root {
            --bg-color: #fdfbf7;
            --text-color: #333;
            --yellow-note: #fff740;
            --pink-note: #ff7eb9;
            --blue-note: #7afcff;
            --green-note: #ccff90;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d3ccc1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Nunito', sans-serif;
            color: var(--text-color);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            color: #2c3e50;
            transform: rotate(-2deg);
        }

        /* --- Dashboard & Sticky Notes --- */
        #dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px dashed #888;
            color: #555;
            background-color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            transition: all 0.2s ease;
        }

        .btn-upload:hover { background-color: #eee; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .sticky-note {
            width: 200px;
            height: 200px;
            padding: 25px 15px 15px;
            background: var(--yellow-note);
            position: relative;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.1);
            border-bottom-right-radius: 30px 5px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sticky-note:nth-child(even) { background: var(--pink-note); transform: rotate(2deg); }
        .sticky-note:nth-child(3n) { background: var(--blue-note); transform: rotate(-3deg); }
        .sticky-note:hover { transform: scale(1.05) translateY(-5px); z-index: 10; }

        .pin {
            width: 15px;
            height: 15px;
            background-color: #ff3b30;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), 1px 2px 3px rgba(0,0,0,0.2);
        }

        .note-title {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            text-align: center;
            word-wrap: break-word;
        }

        .delete-project {
            background: none;
            border: none;
            color: red;
            font-weight: bold;
            cursor: pointer;
            align-self: flex-end;
        }

        /* --- Editor Workspace --- */
        #workspace {
            display: none;
            height: 85vh;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            border-radius: 5px;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: #fff9e6;
            border-right: 2px dashed #d3ccc1;
            padding: 10px;
            overflow-y: auto;
        }

        .file-tree ul { list-style: none; padding-left: 15px; }
        .file-tree li { margin: 5px 0; cursor: pointer; font-size: 0.9rem; }
        .file-tree li:hover { color: #d35400; font-weight: bold; }
        .folder { font-weight: bold; color: #2980b9; }
        .folder::before { content: '📁 '; }
        .file::before { content: '📄 '; }

        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .editor-header {
            padding: 10px;
            background: #f1f1f1;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-action {
            background: var(--green-note);
            border: 1px solid #ccc;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .btn-action:active { box-shadow: 0px 0px 0px; transform: translateY(2px); }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            background-color: #faf9f5;
            color: #333;
        }

        .history-panel {
            width: 300px;
            background: #fdfbf7;
            border-left: 2px dashed #d3ccc1;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .history-panel h3 {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem;
            border-bottom: 1px solid #ccc;
            margin-bottom: 10px;
            padding-bottom: 5px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            background: white;
            border-left: 3px solid #f39c12;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.05);
        }
        
        .auto-save-status {
            font-size: 0.8rem;
            color: #27ae60;
            margin-left: 10px;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.5s;
        }

    </style>
</head>
<body>

    <header>
        <h1>Addon Manager</h1>
    </header>

    <div id="dashboard">
        <div class="upload-btn-wrapper">
            <button class="btn-upload">+ Upload Folder Addon</button>
            <input type="file" id="folderInput" webkitdirectory directory multiple onchange="handleUpload(event)">
        </div>
        <div id="projectList" style="display: flex; gap: 20px; flex-wrap: wrap; margin-left: 20px;"></div>
    </div>

    <div id="workspace" style="display: none;">
        <div class="sidebar">
            <button class="btn-action" style="width: 100%; margin-bottom: 15px; background: #ff7eb9;" onclick="closeProject()">← Kembali</button>
            <h3 style="font-family: 'Caveat'; font-size: 1.5rem; margin-bottom: 10px;">Structure</h3>
            <div id="fileTree" class="file-tree"></div>
        </div>

        <div class="editor-main">
            <div class="editor-header">
                <div>
                    <strong id="currentFileName">Pilih file untuk diedit...</strong>
                    <span id="saveStatus" class="auto-save-status">Tersimpan!</span>
                </div>
                <div>
                    <button class="btn-action" onclick="manualSave()">💾 Save Addon (ZIP)</button>
                </div>
            </div>
            <textarea id="codeEditor" disabled placeholder="Isi file akan muncul di sini..."></textarea>
        </div>

        <div class="history-panel">
            <h3>Activity History 📌</h3>
            <div id="historyLog"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let db = {
            projects: {},
            history: []
        };
        let currentProjectName = null;
        let currentFileEdit = null;
        let autoSaveTimer = null;

        // Inisialisasi: Muat dari LocalStorage jika ada
        window.onload = () => {
            const savedDb = localStorage.getItem('admud_addon_db');
            if (savedDb) {
                db = JSON.parse(savedDb);
            }
            renderDashboard();
        };

        // Fungsi Simpan ke LocalStorage
        function saveDB() {
            try {
                localStorage.setItem('admud_addon_db', JSON.stringify(db));
            } catch (e) {
                alert("Penyimpanan penuh! LocalStorage melebihi batas (biasanya 5MB).");
            }
        }

        function getTimestamp() {
            const now = new Date();
            return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
        }

        function addLog(message) {
            const logEntry = `${getTimestamp()} ${message}`;
            if (!db.history[currentProjectName]) db.history[currentProjectName] = [];
            db.history[currentProjectName].unshift(logEntry); // Tambah ke atas
            saveDB();
            renderHistory();
        }

        // --- UPLOAD HANDLER ---
        async function handleUpload(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            const projectName = files[0].webkitRelativePath.split('/')[0];
            
            if(db.projects[projectName]) {
                if(!confirm(`Project ${projectName} sudah ada. Ingin menimpanya?`)) return;
            }

            db.projects[projectName] = {};
            db.history[projectName] = [];

            addLog(`User membuat/upload project baru: ${projectName}`);

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const path = file.webkitRelativePath;
                
                // Baca file (hanya simpan text untuk file JS/JSON/lang, abaikan gambar/binari agar localstorage tidak penuh)
                if (file.name.endsWith('.js') || file.name.endsWith('.json') || file.name.endsWith('.lang') || file.name.endsWith('.txt')) {
                    const content = await file.text();
                    db.projects[projectName][path] = content;
                } else {
                    db.projects[projectName][path] = "[File Binari/Gambar - Tidak dapat diedit di Web]";
                }
            }

            saveDB();
            renderDashboard();
            event.target.value = ""; // reset input
        }

        // --- RENDER DASHBOARD ---
        function renderDashboard() {
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('workspace').style.display = 'none';
            const list = document.getElementById('projectList');
            list.innerHTML = '';

            for (const proj in db.projects) {
                const note = document.createElement('div');
                note.className = 'sticky-note';
                note.innerHTML = `
                    <div class="pin"></div>
                    <div class="note-title" onclick="openProject('${proj}')">${proj}</div>
                    <button class="delete-project" onclick="deleteProject('${proj}', event)">Hapus x</button>
                `;
                list.appendChild(note);
            }
        }

        // --- BUKA PROJECT ---
        function openProject(name) {
            currentProjectName = name;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('workspace').style.display = 'flex';
            document.getElementById('currentFileName').innerText = "Pilih file untuk diedit...";
            document.getElementById('codeEditor').value = "";
            document.getElementById('codeEditor').disabled = true;
            
            renderFileTree();
            renderHistory();
            addLog(`User membuka project`);
        }

        function closeProject() {
            currentProjectName = null;
            currentFileEdit = null;
            renderDashboard();
        }

        function deleteProject(name, event) {
            event.stopPropagation();
            if (confirm(`Yakin ingin menghapus seluruh project ${name}?`)) {
                delete db.projects[name];
                delete db.history[name];
                saveDB();
                renderDashboard();
            }
        }

        function deleteFile(path, event) {
            event.stopPropagation();
            if (confirm(`Hapus file ${path}?`)) {
                delete db.projects[currentProjectName][path];
                addLog(`User menghapus file: ${path.split('/').pop()}`);
                saveDB();
                renderFileTree();
                if (currentFileEdit === path) {
                    document.getElementById('codeEditor').value = "";
                    document.getElementById('codeEditor').disabled = true;
                }
            }
        }

        // --- RENDER FILE TREE ---
        function renderFileTree() {
            const treeContainer = document.getElementById('fileTree');
            const files = db.projects[currentProjectName];
            
            // Konversi path rata menjadi tree (struktur berhirarki)
            const tree = {};
            for (const path in files) {
                const parts = path.split('/');
                let currentLevel = tree;
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (i === parts.length - 1) {
                        currentLevel[part] = path; // Ini file, simpan path lengkapnya
                    } else {
                        if (!currentLevel[part]) currentLevel[part] = {};
                        currentLevel = currentLevel[part];
                    }
                }
            }

            function buildHTML(node) {
                let html = '<ul>';
                for (const key in node) {
                    if (typeof node[key] === 'object') {
                        // Ini Folder
                        html += `<li><span class="folder">${key}</span>${buildHTML(node[key])}</li>`;
                    } else {
                        // Ini File
                        const fullPath = node[key];
                        html += `<li><span class="file" onclick="openFile('${fullPath}')">${key}</span> 
                                 <span style="color:red; cursor:pointer; font-size:10px; margin-left:5px;" onclick="deleteFile('${fullPath}', event)">[x]</span></li>`;
                    }
                }
                html += '</ul>';
                return html;
            }

            treeContainer.innerHTML = buildHTML(tree[currentProjectName] || tree);
        }

        // --- EDITOR & AUTO-SAVE ---
        function openFile(path) {
            currentFileEdit = path;
            const content = db.projects[currentProjectName][path];
            const editor = document.getElementById('codeEditor');
            
            document.getElementById('currentFileName').innerText = path;
            editor.value = content;
            editor.disabled = content.includes("[File Binari"); // Disable kalau binari

            addLog(`User membuka file: ${path.split('/').pop()}`);
        }

        document.getElementById('codeEditor').addEventListener('input', function() {
            if (!currentFileEdit) return;

            const status = document.getElementById('saveStatus');
            status.innerText = "Mengetik...";
            status.style.opacity = 1;
            status.style.color = "#f39c12";

            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                // Proses Auto Save ke memory
                db.projects[currentProjectName][currentFileEdit] = this.value;
                saveDB();
                
                status.innerText = "Auto-Saved!";
                status.style.color = "#27ae60";
                
                addLog(`User mengedit teks pada: ${currentFileEdit.split('/').pop()}`);

                setTimeout(() => { status.style.opacity = 0; }, 2000);
            }, 1500); // Auto-save setelah berhenti mengetik 1.5 detik
        });

        // --- RENDER HISTORY ---
        function renderHistory() {
            const historyContainer = document.getElementById('historyLog');
            if (!currentProjectName || !db.history[currentProjectName]) return;
            
            historyContainer.innerHTML = db.history[currentProjectName].map(log => 
                `<div class="log-entry">${log}</div>`
            ).join('');
        }

        // --- MANUAL EXPORT TO ZIP ---
        async function manualSave() {
            addLog(`User mengekspor project ke ZIP`);
            const zip = new JSZip();
            const files = db.projects[currentProjectName];

            for (const path in files) {
                if(!files[path].includes("[File Binari")) {
                    zip.file(path, files[path]);
                }
            }

            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${currentProjectName}_update.zip`;
                link.click();
            });
        }
    </script>
</body>
</html>
