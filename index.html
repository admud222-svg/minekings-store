<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdHost Manager Mobile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fira+Code&family=Nunito:wght@400;700&display=swap');

        :root {
            --bg-color: #fdfbf7;
            --text-color: #333;
            --yellow-note: #fff740;
            --pink-note: #ff7eb9;
            --blue-note: #7afcff;
            --green-note: #ccff90;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d3ccc1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Nunito', sans-serif;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            color: #2c3e50;
            transform: rotate(-1deg);
        }

        /* --- Dashboard --- */
        #dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            gap: 20px;
        }

        .upload-area {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border: 3px dashed #b2bec3;
            border-radius: 15px;
            background: white;
            text-align: center;
            cursor: pointer;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 1000px;
        }

        .sticky-note {
            aspect-ratio: 1/1;
            padding: 20px 10px 10px;
            background: var(--yellow-note);
            position: relative;
            box-shadow: 3px 5px 10px rgba(0,0,0,0.1);
            border-bottom-right-radius: 30px 5px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .sticky-note:nth-child(even) { background: var(--pink-note); transform: rotate(1deg); }
        .sticky-note:nth-child(3n) { background: var(--blue-note); transform: rotate(-2deg); }

        .pin {
            width: 12px; height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .note-title {
            font-family: 'Caveat', cursive;
            font-size: 1.4rem;
            text-align: center;
            word-break: break-all;
        }

        /* --- Workspace Layout --- */
        #workspace {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            position: fixed;
            top: 0; left: 0;
            background: white;
            z-index: 100;
        }

        .ws-header {
            padding: 10px;
            background: #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ccc;
        }

        .ws-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar Mobile Toggle */
        #sidebar {
            width: var(--sidebar-width);
            background: #fff9e6;
            border-right: 2px dashed #d3ccc1;
            padding: 15px;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        /* Editor Area */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #faf9f5;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        /* History Panel */
        #history {
            width: 250px;
            background: #fdfbf7;
            border-left: 2px dashed #d3ccc1;
            padding: 10px;
            font-size: 0.8rem;
            overflow-y: auto;
        }

        .btn {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: var(--green-note);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .status-pill {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #ddd;
        }

        /* --- Responsive Queries --- */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: 0; top: 50px; bottom: 0;
                z-index: 10;
                transform: translateX(-100%);
            }
            #sidebar.active { transform: translateX(0); box-shadow: 5px 0 15px rgba(0,0,0,0.2); }
            #history { display: none; } /* Sembunyikan history di HP untuk hemat ruang */
            .ws-header { font-size: 0.9rem; }
        }

        .file-item {
            padding: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .file-item:hover { background: #feeaa7; }
        .folder-label { font-weight: bold; color: #2980b9; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div id="main-view">
        <header>
            <h1>Addon Manager</h1>
        </header>

        <div id="dashboard">
            <label class="upload-area">
                <strong>+ Ketuk untuk Upload Folder</strong>
                <p style="font-size: 0.8rem; color: #666;">Pilih folder addon kamu</p>
                <input type="file" id="folderInput" webkitdirectory directory multiple hidden onchange="handleUpload(event)">
            </label>

            <div id="projectGrid" class="project-grid"></div>
        </div>
    </div>

    <div id="workspace">
        <div class="ws-header">
            <button class="btn" style="background: #ff7eb9;" onclick="closeProject()">←</button>
            <div id="activeFileName" style="font-size: 0.8rem; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 150px;">Pilih File</div>
            <button class="btn" onclick="toggleSidebar()">📁 Menu</button>
            <button class="btn" onclick="exportZip()">💾 ZIP</button>
        </div>

        <div class="ws-body">
            <aside id="sidebar">
                <h3 style="font-family: Caveat; font-size: 1.5rem;">File Structure</h3>
                <div id="fileList"></div>
            </aside>

            <main class="editor-container">
                <div style="padding: 5px; background: #eee; display: flex; justify-content: space-between;">
                    <span id="saveIndicator" class="status-pill">Siap</span>
                </div>
                <textarea id="editor" placeholder="Klik file di menu untuk mulai mengedit..."></textarea>
            </main>

            <aside id="history">
                <h3 style="font-family: Caveat; font-size: 1.2rem;">Riwayat</h3>
                <div id="logContent"></div>
            </aside>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let db = { projects: {}, history: {} };
        let activeProject = null;
        let activeFile = null;
        let timer = null;

        // Load Data
        window.onload = () => {
            const saved = localStorage.getItem('adhost_db_v2');
            if (saved) db = JSON.parse(saved);
            renderDashboard();
        };

        function saveToDisk() {
            try {
                localStorage.setItem('adhost_db_v2', JSON.stringify(db));
            } catch (e) {
                alert("Penyimpanan browser penuh! Hapus beberapa project lawas.");
            }
        }

        function addLog(msg) {
            if(!db.history[activeProject]) db.history[activeProject] = [];
            const time = new Date().toLocaleTimeString('id-ID');
            db.history[activeProject].unshift(`[${time}] ${msg}`);
            renderHistory();
        }

        async function handleUpload(e) {
            const files = e.target.files;
            if (!files.length) return;

            const projectName = files[0].webkitRelativePath.split('/')[0];
            db.projects[projectName] = {};
            db.history[projectName] = [];

            for (const file of files) {
                const path = file.webkitRelativePath;
                // Hanya baca file teks agar hemat memori
                if (file.size < 1000000 && (file.name.match(/\.(js|json|lang|txt|md)$/))) {
                    const content = await file.text();
                    db.projects[projectName][path] = content;
                } else {
                    db.projects[projectName][path] = "[File Non-Teks/Terlalu Besar]";
                }
            }

            saveToDisk();
            renderDashboard();
            alert(`Project ${projectName} berhasil diimpor!`);
        }

        function renderDashboard() {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';
            for (const name in db.projects) {
                const card = document.createElement('div');
                card.className = 'sticky-note';
                card.innerHTML = `
                    <div class="pin"></div>
                    <div class="note-title" onclick="openProject('${name}')">${name}</div>
                    <div style="margin-top:10px; color:red; font-size:0.7rem;" onclick="deleteProject('${name}')">Hapus [x]</div>
                `;
                grid.appendChild(card);
            }
        }

        function openProject(name) {
            activeProject = name;
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('workspace').style.display = 'flex';
            renderFileList();
            renderHistory();
            addLog("Membuka project");
        }

        function closeProject() {
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('workspace').style.display = 'none';
            activeProject = null;
            activeFile = null;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            const files = db.projects[activeProject];
            
            // Urutkan file
            Object.keys(files).sort().forEach(path => {
                const parts = path.split('/');
                const fileName = parts.pop();
                const folderPath = parts.join('/');
                
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <span onclick="loadFile('${path}')">📄 ${fileName}</span>
                    <span style="color:red;" onclick="deleteFile('${path}')">×</span>
                `;
                list.appendChild(item);
            });
        }

        function loadFile(path) {
            activeFile = path;
            const content = db.projects[activeProject][path];
            document.getElementById('editor').value = content;
            document.getElementById('activeFileName').innerText = path.split('/').pop();
            document.getElementById('sidebar').classList.remove('active');
            addLog(`Membuka file: ${path.split('/').pop()}`);
        }

        // Auto Save Logic
        document.getElementById('editor').oninput = function() {
            if(!activeFile) return;
            
            const indicator = document.getElementById('saveIndicator');
            indicator.innerText = "Mengetik...";
            indicator.style.background = "#ffeaa7";

            clearTimeout(timer);
            timer = setTimeout(() => {
                db.projects[activeProject][activeFile] = this.value;
                saveToDisk();
                indicator.innerText = "Tersimpan Otomatis";
                indicator.style.background = "#ccff90";
                addLog(`Mengedit file: ${activeFile.split('/').pop()}`);
            }, 1000);
        };

        function renderHistory() {
            const log = document.getElementById('logContent');
            if(db.history[activeProject]) {
                log.innerHTML = db.history[activeProject].map(h => `<div style="margin-bottom:5px; border-bottom:1px solid #eee;">${h}</div>`).join('');
            }
        }

        function deleteFile(path) {
            if(confirm("Hapus file ini?")) {
                delete db.projects[activeProject][path];
                addLog(`Menghapus file: ${path}`);
                saveToDisk();
                renderFileList();
            }
        }

        function deleteProject(name) {
            if(confirm(`Hapus seluruh project ${name}?`)) {
                delete db.projects[name];
                delete db.history[name];
                saveToDisk();
                renderDashboard();
            }
        }

        async function exportZip() {
            const zip = new JSZip();
            const project = db.projects[activeProject];
            for (const path in project) {
                if(!project[path].includes("[File Non-Teks]")) {
                    zip.file(path, project[path]);
                }
            }
            const blob = await zip.generateAsync({type:"blob"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${activeProject}_AdHost.zip`;
            a.click();
            addLog("Mengekspor ke ZIP");
        }
    </script>
</body>
</html>
